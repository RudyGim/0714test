<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학교생활로 알아보는 나의 MBTI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');

        :root {
            --bg-color: #f5f7f8;      
            --primary-color: #b5ceda; 
            --secondary-color: #cfe7cf; 
            --accent-color: #e0cfe4;    
            --text-color: #4a4a4a;     
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            padding: 40px 25px;
            text-align: center;
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 10px;
            color: #333;
            word-break: keep-all;
        }

        p.subtitle {
            font-size: 1rem;
            color: #777;
            margin-bottom: 30px;
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            color: var(--text-color);
        }

        .btn-start {
            background-color: var(--primary-color);
            margin-top: 10px;
        }

        .btn-start:hover {
            background-color: #a1bed8;
            transform: translateY(-2px);
        }

        #quiz-screen {
            display: none;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background-color: #eef2f1;
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background-color: var(--primary-color);
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 25px;
            text-align: right;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 35px;
            line-height: 1.5;
            word-break: keep-all;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .answer-btn {
            background-color: #fafdff;
            border: 2px solid #eef2f1;
            margin-bottom: 15px;
            text-align: left;
            font-weight: 500;
            line-height: 1.4;
        }

        .answer-btn:hover {
            background-color: var(--secondary-color);
            border-color: var(--secondary-color);
            transform: translateY(-2px);
        }

        #result-screen {
            display: none;
        }

        .result-title {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 5px;
        }

        .result-mbti {
            font-size: 2.5rem;
            font-weight: 700;
            color: #4a6fa5;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .result-desc {
            background-color: #f9fbfb;
            padding: 20px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.6;
            text-align: left;
            margin-bottom: 25px;
            white-space: pre-line;
            word-break: keep-all;
        }

        .btn-restart {
            background-color: var(--accent-color);
        }

        .btn-restart:hover {
            background-color: #d1bad7;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1. 시작 화면 -->
        <div id="start-screen">
            <div style="font-size: 70px; margin-bottom: 20px;">🏫</div>
            <h1>학교생활로 알아보는<br>나의 MBTI 테스트</h1>
            <p class="subtitle">새 학기, 교실 속 내 모습은 어떨까?<br>(총 20문항)</p>
            <button class="btn-start" onclick="startQuiz()">테스트 시작하기</button>
        </div>

        <!-- 2. 퀴즈 화면 -->
        <div id="quiz-screen">
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="progress-text" id="progress-text">1 / 20</div>
            <div class="question-text" id="question">질문</div>
            <button class="answer-btn" id="btnA" onclick="selectAnswer('A')">선택지 A</button>
            <button class="answer-btn" id="btnB" onclick="selectAnswer('B')">선택지 B</button>
        </div>

        <!-- 3. 결과 화면 -->
        <div id="result-screen">
            <div style="font-size: 60px; margin-bottom: 15px;">✨</div>
            <p class="result-title">나의 학교생활 유형은?</p>
            <div class="result-mbti" id="result-mbti">MBTI</div>
            <div class="result-desc" id="result-desc">설명</div>
            <button class="btn-restart" onclick="restartQuiz()">다시 테스트하기</button>
        </div>
    </div>

    <script>
        // 총 20가지 질문 (EI, SN, TF, JP 각각 5문항씩 배치)
        const questions = [
            // 1~4
            { type: "EI", q: "새 학기 첫날, 교실에 들어섰을 때 나의 행동은?", a: "보이는 친구들에게 먼저 다가가 반갑게 인사한다.", b: "친한 친구가 있나 조용히 둘러보고 빈자리에 앉는다." },
            { type: "SN", q: "선생님이 주관식 과제를 내주셨을 때 나는?", a: "기존 예시나 가이드라인을 먼저 참고해서 안전하게 쓴다.", b: "나만의 독창적이고 새로운 아이디어를 떠올려 채워나간다." },
            { type: "TF", q: "친구가 시험을 망쳐서 우울해하고 있을 때 나는?", a: "오답 노트를 같이 봐주거나 다음 시험 전략을 이야기해 준다.", b: "속상하겠다며 맛있는 걸 사주고 마음을 진심으로 위로해 준다." },
            { type: "JP", q: "방학 숙제를 해결하는 나의 스타일은?", a: "매일 조금씩 할 수 있도록 미리 계획표를 짜서 실천한다.", b: "미루고 미루다 개학 직전에 집중력을 발휘해 끝낸다." },
            
            // 5~8
            { type: "EI", q: "쉬는 시간이 되었을 때 주로 하는 행동은?", a: "복도로 나가거나 다른 반 친구들 자리에 가서 수다를 떤다.", b: "자리에서 휴대폰을 보거나 엎드려 자며 에너지를 충전한다." },
            { type: "SN", q: "수업 시간에 멍을 때릴 때 드는 생각은?", a: "오늘 급식 메뉴가 뭐였는지 혹은 방과 후 스케줄을 생각한다.", b: '인류가 멸망해서 학교가 무너지면 난 어떻게 탈출하지? 같은 상상을 한다.' },
            { type: "TF", q: "조별 과제 도중 조원이 의견 충돌로 다툴 때 나는?", a: "상황을 객관적으로 분석해 누구 말이 더 효율적인지 따져본다.", b: "분위기가 너무 어색해지지 않도록 양쪽 마음을 중재하려 애쓴다." },
            { type: "JP", q: "시험 기간 공부를 시작할 때 나의 모습은?", a: "과목별 시간 배분과 하루 목표량을 정해놓고 시작해야 마음이 편하다.", b: "일단 책상에 앉아서 눈에 보이는 과목이나 끌리는 과목부터 공부한다." },
            
            // 9~12
            { type: "EI", q: "체육대회나 축제 같은 학교 행사가 열리면?", a: "적극적으로 응원하고 참여하며 분위기를 주도하고 즐긴다.", b: "친구들이랑 적당히 구경하면서 빨리 끝났으면 좋겠다고 생각한다." },
            { type: "SN", q: "선생님이 과목 설명을 위해 예시를 들 때 내가 더 잘 이해하는 방식은?", a: "실제 일어났던 사례나 구체적인 수치로 설명해 주실 때", b: "비유나 상징적 모델, 이론적인 개념으로 설명해 주실 때" },
            { type: "TF", q: "선생님이 과제에 대해 피드백을 주실 때 더 선호하는 태도는?", a: "어디가 틀렸고 어떻게 고쳐야 하는지 직설적이고 명확하게 지적받는 것", b: "부족한 점이 있더라도 우선 노력한 부분을 칭찬하고 부드럽게 권유해 주는 것" },
            { type: "JP", q: "학교 끝나고 친구들과 떡볶이를 먹으러 가기로 했을 때 선호하는 루트는?", a: "미리 맛집 리스트를 찾아보고 동선까지 정해서 가야 만족스럽다.", b: "그냥 발길 닿는 대로 걷다가 맛있어 보이는 가게에 들어가서 먹는 게 좋다." },

            // 13~16 (추가 문항)
            { type: "EI", q: "새로운 동아리를 선택해야 할 때 내가 기준으로 삼는 것은?", a: "사람이 많고 북적이며 다양한 친구들을 사귈 수 있는 곳", b: "내가 조용히 집중할 수 있거나 소수 정예로 운영되는 곳" },
            { type: "SN", q: "새 교과서를 받았을 때 내가 먼저 하는 행동은?", a: "낙서할 곳이 있는지 보거나 맨 뒤의 단원 요약을 쓱 훑어본다.", b: "전체적인 차례(목차)를 보며 올해 어떤 걸 배울지 상상해본다." },
            { type: "TF", q: "친구가 나에게 '나 오늘 기분 나빠서 머리 잘랐어'라고 한다면 나의 반응은?", a: "왜 기분이 나빴어? 무슨 일 있었어?", b: "머리 어떻게 잘랐는데? 예쁘게 잘 됐어?" },
            { type: "JP", q: "갑작스럽게 선생님이 '오늘 5교시는 자습이다!'라고 선언했을 때 나는?", a: "계획에 없던 자습이라 무엇을 공부해야 할지 잠깐 고민에 빠진다.", b: "오예! 개이득!을 외치며 밀린 잠을 자거나 밀린 폰을 한다." },

            // 17~20 (추가 문항)
            { type: "EI", q: "이동수업이나 등교길에 혼자 걸어가고 있을 때 나는?", a: "아는 친구를 마주치면 멀리서도 크게 이름을 부르며 뛰어간다.", b: "마주치면 인사하겠지만, 굳이 먼저 아는 척하기 쑥스러워 폰을 보는 척한다." },
            { type: "SN", q: "수학 여행이나 소풍을 가기 전날 밤 내 머릿속은?", a: "내일 입을 옷 코디와 챙겨야 할 준비물 체크리스트로 가득하다.", b: "가서 일어날 수 있는 온갖 재밌는 상황이나 에피소드를 시뮬레이션한다." },
            { type: "TF", q: "내가 생각하는 '좋은 선생님'의 조건에 더 가까운 것은?", a: "수업을 정말 명쾌하고 정확하게 잘 가르쳐서 실력을 키워주시는 분", b: "학생들의 마음을 잘 알아주고 따뜻하게 공감하며 소통해주시는 분" },
            { type: "JP", q: "노트 필기나 교과서 정리를 할 때 나의 서타일은?", a: "색깔별 펜과 자를 활용해 일목요연하고 깔끔하게 정돈하는 편이다.", b: "그때그때 중요해 보이는 곳에 자유롭게 필기하고 밑줄을 긋는 편이다." }
        ];

        const mbtiResults = {
            "ISTJ": "원칙주의자 반장\n성실하고 책임감이 강해 학급의 규칙을 철저히 지킵니다. 시간 약속과 숙제를 한 번도 어기지 않는 모범생 스타일이에요.",
            "ISFJ": "수호천사 짝꿍\n주변 친구들을 조용히 챙겨주는 따뜻한 사람입니다. 친구의 사소한 고민도 귀담아들어 주고 위로해 주는 최고의 짝꿍입니다.",
            "INFJ": "비밀스러운 교실의 현자\n조용하지만 통찰력이 깊어 친구들의 내면을 잘 파악합니다. 혼자만의 공상이나 깊은 생각에 잠기는 것을 좋아해요.",
            "INTJ": "전교 1등 전략가\n학습 효율성을 중요하게 생각하며 계획적인 공부의 달인입니다. 비효율적인 조별 과제보다는 혼자 빠르게 해결하는 걸 선호해요.",
            "ISTP": "체육시간의 에이스\n말수가 적고 조용하지만 손재주가 좋거나 운동 능력이 뛰어납니다. 귀찮은 건 싫어하지만 벼락치기 효율은 최강이에요.",
            "ISFP": "은밀한 예술가 카피바라\n교실에서 가장 평화로운 영혼입니다. 갈등을 극도로 싫어하며, 매점 가는 시간과 하교 후 침대에 눕는 시간을 가장 행복해합니다.",
            "INFP": "감성 가득한 도서부원\n풍부한 상상력과 따뜻한 감성을 가졌습니다. 수업 시간에 나만의 세계에 빠지기 쉬우며 글로 마음을 표현하는 데 능숙합니다.",
            "INTP": "방구석 아인슈타인\n관심 있는 과목에는 천재적인 지식을 뽐내지만 관심 없는 과목은 쿨하게 패스합니다. 선생님의 설명에 마음속으로 '왜 그럴까?' 질문을 던집니다.",
            "ESTP": "급식실 1등 질주마\n활동적이고 에너지가 넘쳐 학교의 모든 활동에 몸을 던집니다. 유머 감각이 있어 어딜 가나 친구들이 끊이지 않아요.",
            "ESFP": "학급의 연예인 센터\n쉬는 시간마다 교실 분위기를 쥐락팎락하는 핵인싸입니다. 축제나 장기자랑 무대에서 숨겨진 끼를 대방출하는 주인공이에요.",
            "ENFP": "리액션 장인 분위기메이커\n호기심이 많고 긍정 에너지가 넘칩니다. 친구들의 작은 이야기에도 온몸으로 반응해 주며, 매일 새로운 재미를 찾아 헤맵니다.",
            "ENTP": "토론 대장 프로반박러\n선생님이나 친구들의 의견에 창의적인 의문을 제기하길 좋아합니다. 재치 있는 말솜씨로 지루한 수업 시간을 흥미진진하게 만듭니다.",
            "ESTJ": "호랑이 학생회장\n추진력과 리더십이 뛰어나 조별 과제나 학급 행사를 군더더기 없이 완벽하게 이끌어갑니다. 공과 사가 확실한 스타일이에요.",
            "ESFJ": "우리 반 마당발\n모든 친구의 생일을 기억하고 챙겨줄 만큼 사교성이 좋습니다. 학급의 대소사를 도맡아 해결하는 든든한 정 많은 친구입니다.",
            "ENFJ": "모두를 이끄는 아이돌 멘토\n부드러운 카리스마로 소외되는 친구 없이 모두를 포용하는 리더입니다. 친구들이 성장할 수 있도록 격려와 칭찬을 아끼지 않아요.",
            "ENTJ": "조별과제 캐리머신\n목표 중심적인 성향으로 목표 등수를 정하면 무섭게 돌진합니다. 조별 과제를 할 때 진두지휘하여 최고의 결과물을 만들어내요."
        };

        let currentIdx = 0;
        let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

        function startQuiz() {
            document.getElementById("start-screen").style.display = "none";
            document.getElementById("quiz-screen").style.display = "block";
            showQuestion();
        }

        function showQuestion() {
            const currentQ = questions[currentIdx];
            
            const progress = (currentIdx / questions.length) * 100;
            document.getElementById("progress-bar").style.width = `${progress}%`;
            document.getElementById("progress-text").textContent = `${currentIdx + 1} / ${questions.length}`;

            document.getElementById("question").textContent = currentQ.q;
            document.getElementById("btnA").textContent = currentQ.a;
            document.getElementById("btnB").textContent = currentQ.b;
        }

        function selectAnswer(choice) {
            const currentQ = questions[currentIdx];
            const type = currentQ.type;

            if (choice === 'A') {
                scores[type[0]]++;
            } else {
                scores[type[1]]++;
            }

            currentIdx++;

            if (currentIdx < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById("quiz-screen").style.display = "none";
            document.getElementById("result-screen").style.display = "block";

            let mbti = "";
            mbti += scores.E >= scores.I ? "E" : "I";
            mbti += scores.S >= scores.N ? "S" : "N";
            mbti += scores.T >= scores.F ? "T" : "F";
            mbti += scores.J >= scores.P ? "J" : "P";

            document.getElementById("result-mbti").textContent = mbti;
            document.getElementById("result-desc").textContent = mbtiResults[mbti] || "알 수 없는 유형입니다.";
        }

        function restartQuiz() {
            currentIdx = 0;
            scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
            document.getElementById("result-screen").style.display = "none";
            document.getElementById("start-screen").style.display = "block";
        }
    </script>
</body>
</html>
