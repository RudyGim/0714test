<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파스텔 성향 테스트</title>
    <!-- 동글동글한 분위기의 구글 Jua 폰트 불러오기 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    
    <style>
        /* 전체 스타일 리셋 및 둥근 폰트 적용 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Jua', sans-serif;
        }

        body {
            background-color: #E3F2FD; /* 하늘색 파스텔톤 배경 */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 떠다니는 알파벳 스타일 */
        .floating-letter {
            position: absolute;
            font-size: 2.5rem;
            color: rgba(255, 255, 255, 0.6);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.05);
            user-select: none;
            z-index: 1;
            animation: float-around 12s infinite ease-in-out alternate;
        }

        @keyframes float-around {
            0% { transform: translateY(0) translateX(0) rotate(0deg); }
            50% { transform: translateY(-40px) translateX(20px) rotate(10deg); }
            100% { transform: translateY(20px) translateX(-20px) rotate(-10deg); }
        }

        /* 메인 컨텐츠 카드 */
        .container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 2.5rem 2rem;
            border-radius: 30px; /* 동글동글한 모서리 */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 480px;
            width: 90%;
            z-index: 10;
            border: 4px solid #BBDEFB;
        }

        /* 타이틀 및 텍스트 */
        h1 {
            font-size: 2.2rem;
            color: #5C6BC0;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.15rem;
            color: #78909C;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        /* 진행도 바 (Progress Bar) */
        .progress-container {
            width: 100%;
            background-color: #E0E0E0;
            border-radius: 20px;
            margin-bottom: 2rem;
            display: none; /* 처음엔 숨김 */
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 12px;
            background-color: #90CAF9;
            border-radius: 20px;
            transition: width 0.3s ease;
        }

        /* 버튼 기본 스타일 (공통) */
        .btn {
            display: block;
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1.25rem;
            background-color: #90CAF9; /* 기본 하늘색 파스텔톤 */
            color: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(144, 202, 249, 0.3);
            margin-bottom: 1rem;
            word-break: keep-all;
        }

        /* 버튼 마우스 오버 시 노란색 파스텔톤 포인트 */
        .btn:hover {
            background-color: #FFF59D; 
            color: #795548; 
            transform: scale(1.03);
            box-shadow: 0 8px 20px rgba(255, 245, 157, 0.5);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* 큰 메인 시작 버튼 전용 크기 */
        .start-btn {
            font-size: 1.5rem;
            padding: 1.2rem 2rem;
            margin-bottom: 0;
        }

        /* 화면 전환용 클래스 */
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }

        /* 결과 창 스타일 */
        .result-mbti {
            font-size: 3.5rem;
            color: #FFB74D; /* 파스텔 오렌지/노랑 계열 */
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <!-- 배경에 떠다닐 동글동글한 MBTI 알파벳들 -->
    <div class="floating-letter" style="top: 15%; left: 10%; animation-delay: 0s;">E</div>
    <div class="floating-letter" style="top: 20%; right: 15%; animation-delay: 1.5s;">I</div>
    <div class="floating-letter" style="top: 75%; left: 15%; animation-delay: 3s;">S</div>
    <div class="floating-letter" style="top: 70%; right: 20%; animation-delay: 0.5s;">N</div>
    <div class="floating-letter" style="top: 40%; left: 5%; animation-delay: 2s;">T</div>
    <div class="floating-letter" style="top: 45%; right: 8%; animation-delay: 3.5s;">F</div>
    <div class="floating-letter" style="top: 85%; left: 45%; animation-delay: 1s;">J</div>
    <div class="floating-letter" style="top: 10%; left: 50%; animation-delay: 2.5s;">P</div>

    <div class="container">
        <!-- 진행도 표시 바 -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- 1. 시작 페이지 -->
        <div id="start-page" class="page active">
            <h1>나의 성향 테스트</h1>
            <p>동글동글 신비로운 성향 테스트!<br>12개의 질문으로 나의 진짜 성격을 알아봐요.</p>
            <button class="btn start-btn" onclick="startTest()">테스트 시작하기</button>
        </div>

        <!-- 2. 질문 페이지 -->
        <div id="question-page" class="page">
            <h1 id="question-number">Q1.</h1>
            <p id="question-text">질문 내용이 여기에 들어갑니다.</p>
            <button class="btn answer-btn" id="ansA" onclick="selectAnswer('A')">선택지 A</button>
            <button class="btn answer-btn" id="ansB" onclick="selectAnswer('B')">선택지 B</button>
        </div>

        <!-- 3. 결과 페이지 -->
        <div id="result-page" class="page">
            <h1>나의 성향 결과는?</h1>
            <div class="result-mbti" id="result-mbti">ESTJ</div>
            <p id="result-desc">당신의 멋진 성향 설명이 여기에 나타납니다!</p>
            <button class="btn" onclick="restartTest()">다시 테스트하기</button>
        </div>
    </div>

    <script>
        // 12개 질문 데이터 (E/I, S/N, T/F, J/P 각각 3문항씩 조합)
        const questions = [
            { q: "주말이 되었을 때 나의 행동은?", a: "친구들과 만나 수다를 떨며 에너지를 얻는다!", b: "집에서 혼자 침대와 물아일체가 되어 쉰다.", type: "EI" },
            { q: "새로운 사람들과 가득한 모임에 갔을 때 나는?", a: "자연스럽게 먼저 말을 걸며 친해진다.", b: "조용히 타이밍을 보다가 말을 걸어오면 대화한다.", type: "EI" },
            { q: "오랜만에 정말 재밌는 이벤트를 발견했다면?", a: "당장 주변 사람들에게 삐삐를 쳐서 같이 가자고 한다.", b: "우선 나 혼자 가거나 가장 친한 단짝 한 명과 간다.", type: "EI" },
            
            { q: "하늘에 떠 있는 구름을 볼 때 드는 생각은?", a: "날씨 맑네, 오늘 빨래 잘 마르겠다.", b: "폭신폭신해 보인다... 저 위에 누우면 푹 꺼질까?", type: "SN" },
            { q: "요리 레시피를 보고 음식을 만들 때 나는?", a: "g수와 양념 비율을 정확하게 맞춰서 만든다.", b: "눈대중으로 '이 정도면 되겠지' 하며 감으로 넣는다.", type: "SN" },
            { q: "친구 장기자랑을 보러 갔을 때 나는?", a: "친구가 무대 위에서 보여주는 춤과 노래에 집중한다.", b: "'저 무대를 준비하려고 얼마나 고생했을까' 상상한다.", type: "SN" },
            
            { q: "친구가 '나 슬퍼서 빵 샀어'라고 말한다면?", a: "왜 슬펐어? 무슨 일 있었어? (슬픈 이유가 궁금)", b: "무슨 빵 샀는데? 맛있어? (빵 종류가 궁금)", type: "FT" }, // A: F, B: T
            { q: "힘들어하는 사람을 위로할 때 내가 더 선호하는 방법은?", a: "이야기를 끝까지 들어주고 마음 깊이 공감해 주기", b: "상황을 분석해서 해결할 수 있는 현실적인 방법 제시하기", type: "FT" }, // A: F, B: T
            { q: "영화나 드라마에서 슬픈 장면이 나오면 나는?", a: "주인공에게 과몰입해서 눈물이 왈칵 쏟아진다.", b: "슬프긴 하지만 '와 배우들 연기 진짜 잘한다' 생각한다.", type: "FT" }, // A: F, B: T
            
            { q: "여행 계획을 세울 때 나의 스타일은?", a: "시간별 이동 동선과 맛집 리스트를 미리 다 짜둔다.", b: "비행기표랑 숙소만 해두고 발길 닿는 대로 움직인다.", type: "JP" },
            { q: " 방 정리를 하거나 물건을 둘 때 나는?", a: "제자리가 정해져 있어서 늘 쓰던 곳에 정돈해 둔다.", b: "그때그때 편한 곳에 두고 나중에 한 번에 치운다.", type: "JP" },
            { q: "과제나 마감 기한이 있는 일을 할 때 나는?", a: "미리 계획을 세워서 여유롭게 끝내 두는 편이다.", b: "벼락치기가 제맛! 마감 직전 초인적인 힘을 발휘한다.", type: "JP" }
        ];

        let currentIdx = 0;
        // 점수 기록용 변수
        let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

        // 테스트 시작하기
        function startTest() {
            document.getElementById('start-page').classList.remove('active');
            document.getElementById('question-page').classList.add('active');
            document.getElementById('progressContainer').style.display = 'block';
            currentIdx = 0;
            scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
            showQuestion();
        }

        // 질문 보여주기
        function showQuestion() {
            if (currentIdx < questions.length) {
                // 진행도 바 업데이트
                let progress = ((currentIdx) / questions.length) * 100;
                document.getElementById('progressBar').style.width = progress + '%';

                const currentQ = questions[currentIdx];
                document.getElementById('question-number').innerText = `Q${currentIdx + 1}.`;
                document.getElementById('question-text').innerText = currentQ.q;
                document.getElementById('ansA').innerText = currentQ.a;
                document.getElementById('ansB').innerText = currentQ.b;
            } else {
                // 모든 질문 완료 -> 결과 보기
                showResult();
            }
        }

        // 답변 선택 시 점수 계산
        function selectAnswer(choice) {
            const currentQ = questions[currentIdx];
            const type = currentQ.type; // 예: "EI", "SN", "FT", "JP"

            if (type === "EI") {
                choice === 'A' ? scores.E++ : scores.I++;
            } else if (type === "SN") {
                choice === 'A' ? scores.S++ : scores.N++;
            } else if (type === "FT") {
                // 이 코드에서는 편리하게 A를 감성(F), B를 이성(T)으로 배치했습니다.
                choice === 'A' ? scores.F++ : scores.T++;
            } else if (type === "JP") {
                choice === 'A' ? scores.J++ : scores.P++;
            }

            currentIdx++;
            showQuestion();
        }

        // 결과 화면 보여주기
        function showResult() {
            document.getElementById('progressBar').style.width = '100%';
            document.getElementById('question-page').classList.remove('active');
            document.getElementById('result-page').classList.add('active');

            // MBTI 결과 조합
            let mbti = "";
            mbti += (scores.E >= scores.I) ? "E" : "I";
            mbti += (scores.S >= scores.N) ? "S" : "N";
            mbti += (scores.T >= scores.F) ? "T" : "F";
            mbti += (scores.J >= scores.P) ? "J" : "P";

            document.getElementById('result-mbti').innerText = mbti;

            // 결과별 간단 설명 매칭
            const descriptions = {
                "ESTJ": "든든하고 똑 부러지는 현실적인 리더형 바른생활 어른이!",
                "ESTP": "넘치는 에너지로 지루할 틈이 없는 트렌디한 모험가!",
                "ESFJ": "주변 사람들을 살뜰히 챙기는 다정다감 친절 왕!",
                "ESFP": "어디서나 스포트라이트를 받는 유쾌 발랄 분위기 메이커!",
                "ENTJ": "철저한 계획과 카리스마로 목표를 쟁취하는 열정 사령관!",
                "ENTP": "반짝이는 아이디어와 위트가 넘치는 호기심 천국 발명가!",
                "ENFJ": "따뜻한 성품으로 정의를 외치며 모두를 이끄는 다정한 지도자!",
                "ENFP": "풍부한 상상력과 댕댕이 같은 매력을 가진 자유로운 영혼!",
                "ISTJ": "한 번 맡은 일은 끝까지 완벽하게 해내는 책임감 대장!",
                "ISTP": "겉은 무심해 보여도 알면 알수록 다재다능한 만능 재주꾼!",
                "ISFJ": "뒤에서 묵묵히 소중한 사람들을 서포트해 주는 수호천사!",
                "ISFP": "예술적 감수성이 풍부하고 갈등을 싫어하는 평화주의자!",
                "INTJ": "깊이 있는 통찰력과 전략적인 사고를 가진 냉철한 전략가!",
                "INTP": "늘 새로운 지식을 갈망하는 논리적인 조용한 천재!",
                "INFJ": "사람의 마음을 꿰뚫어 보며 세상을 이롭게 하려는 이상주의자!",
                "INFP": "마음속 깊이 따뜻함과 나만의 낭만을 간직한 몽상가!"
            };

            document.getElementById('result-desc').innerText = descriptions[mbti] || "매력 넘치는 성향을 가지고 계시네요!";
        }

        // 처음으로 돌아가기
        function restartTest() {
            document.getElementById('result-page').classList.remove('active');
            document.getElementById('progressContainer').style.display = 'none';
            startTest();
        }
    </script>
</body>
</html>
