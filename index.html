    <script>
        const questions = [
            { type: "EI", q: "새 학기 첫날, 교실에 들어섰을 때 나의 행동은?", a: "보이는 친구들에게 먼저 다가가 반갑게 인사하며 분위기를 푼다.", b: "친한 친구가 있나 조용히 둘러보고 빈자리에 가만히 앉아 기다린다." },
            { type: "SN", q: "선생님이 주관식 자유 과제를 내주셨을 때 나는?", a: "작년 선배들이 했던 양식이나 선생님 가이드라인을 철저하게 따져보며 쓴다.", b: "아무도 생각하지 못한 기발하고 파격적인 나만의 주제를 상상하며 채워나간다." },
            { type: "TF", q: "친구가 시험을 완전히 망쳐서 옆에서 우울해하고 있을 때 나는?", a: "오답 노트를 같이 분석해주거나 다음 시험 범위를 확인하며 현실적 팁을 준다.", b: "속상한 마음에 격하게 공감해주고 맛있는 매점 간식을 사주며 위로해 준다." },
            { type: "JP", q: "방학 숙제를 해결하는 나의 진짜 스타일은?", a: "방학 첫 주에 요일별/시간별 분량을 정확히 나누어 계획표대로 실천한다.", b: "마음 편히 놀다가 개학 2~3일 전에 엄청난 벼락치기 집중력을 발휘해 끝낸다." },
            { type: "EI", q: "종이 울리고 쉬는 시간이 되었을 때 주로 하는 행동은?", a: "복도로 즉시 뛰어나가거나 다른 반 친구들 자리에 놀러 가 수다를 떤다.", b: "내 자리에 앉아 조용히 다음 교시 준비를 하거나 폰을 보며 에너지를 모은다." },
            { type: "SN", q: "지루한 수업 시간에 나도 모르게 멍을 때릴 때 내 생각은?", a: "오늘 점심 메뉴가 무엇인지, 하교 후에 학원 가기 싫다는 현실적인 생각", b: "'만약 지금 교실에 좀비가 들이닥치면 난 어떤 필살기로 탈출할까?' 하는 상상" },
            { type: "TF", q: "조별 과제 도중 조원들이 의견 충돌로 크게 투덜대며 다툴 때 나는?", a: "상황을 한 발짝 물러서서 냉정하게 분석한 뒤 어떤 의견이 이성적으로 이득인지 따진다.", b: "서로 감정이 상할까 봐 안절부절못하며 양쪽의 마음을 조율하고 다정하게 중재한다." },
            { type: "JP", q: "중간고사 시험 기간에 공부를 시작할 때 나의 모습은?", a: "과목별 진도와 하루 목표 페이지를 플래너에 꼼꼼히 적어야 비로소 안심이 된다.", b: "일단 독서실 책상에 앉아 손에 잡히는 과목이나 그날 유독 끌리는 과목부터 펼친다." },
            { type: "EI", q: "1년에 딱 한 번 있는 체육대회나 학교 축제가 열리면?", a: "반티 선정부터 응원 춤 연습까지 적극적으로 주도하며 축제 무대를 찢어놓는다.", b: "스탠드나 스탠드 뒤 그늘에 친구들과 옹기종기 앉아 소소하게 구경하며 즐긴다." },
            { type: "SN", q: "선생님이 어려운 개념을 설명할 때 내가 확 와닿는 소통 방식은?", a: "실제 기출문제나 구체적인 숫자, 시각적 통계 자료를 보여주실 때", b: "재미있는 비유나 이론적인 배경, 보이지 않는 거시적 개념으로 설명해 주실 때" },

                study: "공부 의욕은 매일매일 우주 최강이지만 작심삼일로 끝나기 일쑤입니다. 하지만 한 번 삘(Feel)을 받으면 새벽 새워 노트를 기가 막히게 창의적으로 정리해내는 예술적 공부 능력이 있습니다. 조별 과제 시 번뜩이는 톡톡 튀는 기획안을 제시해 팀의 방향성을 신선하게 틀어주는 없어서는 안 될 아이디어 뱅크입니다.",
                good: "INFJ", bad: "ISTJ"
            },
            "ENTP": {

                good: "INFJ", bad: "ISFJ"

            "ESTJ": {
                name: "호랑이 학생회장, 추진력 만렙 교실의 지배자",
                char: "학급 회의를 진행할 때 칠판을 탕탕 치며 단숨에 집중시키는 야무진 리더입니다. 시간 낭비, 약속 위반을 세상에서 가장 혐오하며, 담임 선생님조차 학급 관리를 이 친구에게 전적으로 믿고 맡길 만큼 철두철미한 추진력과 꼼꼼한 조직 통제력을 자랑하는 원탑 대장부 스타일입니다.",
                study: "목표 등수와 타임테이블이 분 단위로 짜인 플래너의 정석을 보여줍니다. 감정에 휘둘리지 않고 슬럼프도 이성으로 찍어누르며 공부합니다. 조별 과제를 시작하는 순간 '너는 자료조사, 너는 ppt, 난 발표. 마감은 내일까지야'라며 전광석화처럼 역할을 분배하고 최고의 결과물로 하드캐리하는 팀장 마스터입니다.",
                good: "ISFJ", bad: "INFP"
            },
            "ESFJ": {
                name: "우리 반 마당발 핵인싸, 교실의 든든한 학급 어머니",
                char: "교실에 들어오는 모든 이의 안부를 묻고 챙기는 다정한 오지라퍼이자 마당발입니다. 소외감을 느끼는 친구가 있으면 슬쩍 다가가 무리에 끼워주는 따뜻한 사회성을 가졌으며, 친구들의 생일 축하 롤링페이퍼와 깜짝파티를 총기획하고 집행하는 학급의 없어서는 안 될 다정한 구심점입니다.",
                study: "선생님의 칭찬과 친구들과의 동반 상승을 위해 열공하는 관계형 학습자입니다. 친구들에게 모르는 문제를 친절하게 설명해주며 자기 지식도 완벽히 다집니다. 조별 과제를 할 때는 완벽한 화합을 조율하며, 조원들의 간식까지 손수 챙겨와 다독거리는 엄마 같은 리더십으로 조를 올 A+로 인도합니다.",
                good: "ISTP", bad: "INTP"
            },
            "ENFJ": {
                name: "모두를 이끄는 아이돌 멘토, 정의로운 골목 대장",
                char: "따뜻한 미소와 범접할 수 없는 카리스마로 학급 전체의 여론을 긍정적인 방향으로 이끄는 이상적인 리더입니다. 불의를 보면 참지 못하고 약한 친구 편에 서서 대변해주며, 선생님들조차 '저 학생은 크게 될 인물'이라며 칭찬을 아끼지 않는 인성 점수 100점 만점의 사기캐릭터입니다.",
                study: "나 혼자 잘 먹고 잘살기 위한 공부보다 사회를 더 좋게 바꾸거나 타인에게 선한 영향력을 끼치겠다는 거대하고 순수한 목표로 펜을 잡습니다. 조별 과제를 할 때 역량이 조금 떨어지는 조원이 있어도 절대 낙오시키지 않고 끝까지 다정하게 가르치고 격려해 다 함께 손잡고 정상으로 올라가는 위대한 멘토입니다.",
                good: "ISFP", bad: "ISTP"
            },
            "ENTJ": {
                name: "조별과제 프리미엄 캐리머신, 전교 1등 야망가",
                char: "눈빛에서부터 '난 무조건 성공한다'는 야망과 자신감이 뿜어져 나오는 카리스마의 군주입니다. 지기 싫어하는 승부욕이 전교 최고라 전교 등수 석차 등 가시적인 성과에서 탑을 찍어야 직성이 풀립니다. 비효율적인 학급 시스템을 보면 바로 학생회에 건의해 뜯어고치는 과감한 혁명가입니다.",
                study: "전체적인 숲을 보며 약점을 전략적으로 파괴하는 타겟형 공부를 합니다. 한 치의 오차도 없는 실행력으로 주변 학우들에게 엄청난 자극을 줍니다. 조별 과제를 하면 무능하거나 게으른 조원은 가차 없이 투명인간 취급하며, 본인의 완벽한 비전대로 조원들을 일사불란하게 지휘해 전교 최고점을 따내는 야수형 리더입니다.",
                good: "INTP", bad: "ISFP"
            }
        };

        let currentIdx = 0;
        let selections = []; // 사용자가 내린 선택의 기록 (A 또는 B)을 저장하여 이전으로 돌아가기 구현
        let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

        function startQuiz() {
            document.getElementById("start-screen").style.display = "none";
            document.getElementById("quiz-screen").style.display = "block";
            currentIdx = 0;
            selections = [];
            scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
            showQuestion();
        }

        function showQuestion() {
            const currentQ = questions[currentIdx];
            
            // 진행 바 및 숫자 업데이트
            const progress = (currentIdx / questions.length) * 100;
            document.getElementById("progress-bar").style.width = `${progress}%`;
            document.getElementById("progress-text").textContent = `${currentIdx + 1} / ${questions.length}`;

            // 질문 및 선택지 바인딩
            document.getElementById("question").textContent = currentQ.q;
            document.getElementById("btnA").textContent = currentQ.a;
            document.getElementById("btnB").textContent = currentQ.b;

            // 1번째 문항일 때는 이전 질문 버튼 숨기기
            if (currentIdx === 0) {
                document.getElementById("btn-back").style.visibility = "hidden";
            } else {
                document.getElementById("btn-back").style.visibility = "visible";
            }
        }

        function selectAnswer(choice) {
            // 현재 선택 기록
            selections.push(choice);

            // 점수 반영
            const currentQ = questions[currentIdx];
            const type = currentQ.type;
            if (choice === 'A') {
                scores[type[0]]++;
            } else {
                scores[type[1]]++;
            }

            currentIdx++;

            if (currentIdx < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function goBack() {
            if (currentIdx > 0) {
                currentIdx--;
                const lastChoice = selections.pop(); // 가장 마지막 선택 꺼내기
                
                // 반영됐던 점수 원상복구
                const currentQ = questions[currentIdx];
                const type = currentQ.type;
                if (lastChoice === 'A') {
                    scores[type[0]]--;
                } else {
                    scores[type[1]]--;
                }
                
                showQuestion();
            }
        }

        function showResult() {
            document.getElementById("quiz-screen").style.display = "none";
            document.getElementById("result-screen").style.display = "block";

            // MBTI 결과 계산
            let mbti = "";
            mbti += scores.E >= scores.I ? "E" : "I";
            mbti += scores.S >= scores.N ? "S" : "N";
            mbti += scores.T >= scores.F ? "T" : "F";
            mbti += scores.J >= scores.P ? "J" : "P";

            const data = mbtiDetailedResults[mbti];

            if(data) {
                document.getElementById("result-mbti").textContent = mbti;
                document.getElementById("result-nickname").textContent = `[${data.name}]`;
                document.getElementById("result-desc-char").textContent = data.char;
                document.getElementById("result-desc-study").textContent = data.study;
                
                // 궁합 렌더링
                const goodType = data.good;
                const badType = data.bad;
                const goodName = mbtiDetailedResults[goodType] ? mbtiDetailedResults[goodType].name.split(',')[0] : "환상의 짝꿍";
                const badName = mbtiDetailedResults[badType] ? mbtiDetailedResults[badType].name.split(',')[0] : "조심할 유형";

                document.getElementById("result-harmony").innerHTML = `
                    <div class="harmony-box">
                        <div class="harmony-item harmony-good">
                            <strong>❤️ 환상의 찰떡반짝 (${goodType})</strong><br><span style="font-size:0.75rem;">${goodName}</span>
                        </div>
                        <div class="harmony-item harmony-bad">
                            <strong>💔 눈치싸움 기싸움 (${badType})</strong><br><span style="font-size:0.75rem;">${badName}</span>
                        </div>
                    </div>
                `;
            } else {
                document.getElementById("result-mbti").textContent = "오류";
                document.getElementById("result-nickname").textContent = "알 수 없는 유형";
            }
        }

        function goHome() {
            document.getElementById("result-screen").style.display = "none";
            document.getElementById("start-screen").style.display = "block";
        }
    </script>
</body>
</html>
